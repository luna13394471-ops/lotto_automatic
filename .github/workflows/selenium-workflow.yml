name: Lotto Auto Purchase

on:
  workflow_dispatch: # 수동 실행 버튼 생성
  schedule:
    # 매주 월요일 KST 07:50 (UTC 22:50) 실행
    - cron: '50 22 * * 0' 
    
jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10' # 버전을 3.10 정도로 명시하면 더 안정적입니다.

    - name: Install dependencies (Python & System)
      run: |
        python -m pip install --upgrade pip
        # 필요한 라이브러리 한 번에 설치
        pip install selenium requests webdriver-manager
        
        # Chrome 실행 및 한글 스크린샷을 위한 필수 패키지 설치
        sudo apt-get update
        sudo apt-get install -y libglib2.0-0 libnss3 libfontconfig1 libxss1 \
                               fonts-nanum fonts-nanum-coding fonts-nanum-eco
        
        # 폰트 캐시 갱신 (한글 깨짐 방지)
        sudo fc-cache -fv
        
    - name: Install Google Chrome Stable
      run: |
        # 최신 안정판 크롬 설치 (기본 설치된 크롬과 버전 충돌 방지)
        wget -q -O - https://dl-ssl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
        sudo sh -c 'echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" >> /etc/apt/sources.list.d/google-chrome.list'
        sudo apt-get update
        sudo apt-get install -y google-chrome-stable
        
    - name: Run Selenium Script
      env: 
        LOTTO_ID: ${{ secrets.LOTTO_ID }}
        LOTTO_PASSWORD: ${{ secrets.LOTTO_PASSWORD }}
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: python main.py
